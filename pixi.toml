[workspace]
channels = ["conda-forge"]
name = "odmain"
platforms = ["linux-64"]
version = "1.0"
description = "Pixi setup to build the OpendTect main branch"

[dependencies]
cmake = "<4.0"
git = "*"
ninja = "*"
7zip = "*"
bzip2 = "*"
openssl = "*"
pkg-config = "*"
hdf5 = "1.14.*"
openscenegraph = "3.6.5.*"
proj = "9.7.*"
qt6-main = "6.9.3.*"
sqlite = "3.52.*"
zlib = "1.3.*"

[target.linux-64.dependencies]
gxx = "<13.4"
alsa-lib = "*"
binutils = "*"
curl = "*"
fontconfig = "*"
glib = "*"
libcups = "*"
libegl-devel = "*"
libgl-devel = "*"
libglu = "*"
libstdcxx-ng = "*"
libtree = "*"
libxcb = "*"
libxkbcommon = "*"
libxkbfile = "*"
nspr = "*"
nss = "*"
qt6-wayland = "6.9.3.*"
sysroot_linux-64 = "*"
wayland = "*"
xcb-util = "*"
xkeyboard-config = "*"
xorg-xorgproto = "*"
xorg-libx11 = "*"
xorg-libxcomposite = "*"
xorg-libxdamage = "*"
xorg-libxi = "*"
xorg-libxinerama = "*"
xorg-libxrandr = "*"
xorg-libxtst = "*"

[tasks.clone]
# git clone the OpendTect main branch
cmd = "git clone -b main --depth 1 https://github.com/OpendTect/OpendTect.git"

[tasks.config]
cmd = [
    "cmake",
    "-G", "Ninja Multi-Config",
    "-S", "./OpendTect",
    "-B", "./build",
    "-D", "OSG_ROOT=./.pixi/envs/default/lib",
    "-D", "CMAKE_INSTALL_PREFIX=./inst",
    "-D", "CMAKE_PREFIX_PATH=./.pixi/envs/default"
]

[tasks.build-dev]
cmd = [
    "cmake",
    "--build", "./build",
    "--config", "Debug",
    "&&",
    "cmake",
    "--install", "./build",
    "--config", "Debug"
]

[tasks.build]
cmd = [
    "cmake",
    "--build", "./build",
    "--config", "Release",
    "&&",
    "cmake",
    "--install", "./build",
    "--config", "Release"
]

[target.linux-64.tasks.release]
cmd = "./build/bin/lux64/Release/od_main"
env = {QT_QPA_PLATFORM="xcb"}

[target.linux-64.tasks.debug]
cmd = "./build/bin/lux64/Debug/od_maind"
env = {QT_QPA_PLATFORM="xcb"}
